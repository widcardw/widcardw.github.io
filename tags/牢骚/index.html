<script>
  var header = document.querySelector("#header")
  var fake = document.querySelector("#fake-head");
  var btn_back = document.querySelector("#back-to-top");
  var toc = document.querySelector("#mytoc");
  var startY = 0;

  document.addEventListener('scroll', function (event) {
    // 目录是否固定
    if (document.documentElement.scrollTop <= 765) {
      toc.className = "widget tag relative"
    } else {
      toc.className = "widget tag fixed"
    }
    // 是否显示网页头
    if (scrollY < startY) {
      header.className = "head-show"
    } else if (scrollY > startY) {
      header.className = "head-hide"
    }
    startY = scrollY;
    // 是否显示回到顶部
    if (document.documentElement.scrollTop > 10) {
      btn_back.className = "back-show"
    } else {
      btn_back.className = "back-hide"
    }
  })

  btn_back.addEventListener("click", function (event) {
    // 回到顶部点击事件
    document.documentElement.scrollTo({
      behavior: "smooth",
      top: 0,
    });
    header.className = "head-show"
    btn_back.className = "back-hide"
    toc.className = "widget tag relative"
  })

  toc.addEventListener("click", function () {
    // 对于点击目录跳转的优化
    setTimeout(function () {
      if (document.documentElement.scrollTop <= 765) {
        toc.className = "widget tag relative"
      } else {
        toc.className = "widget tag fixed"
      }
    }, 5)
  })
  
</script>
